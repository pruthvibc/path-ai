# ── nginx.conf ────────────────────────────────────────────────────────────────
# Place this file at: ai-career-advisor-main/nginx.conf
#
# Nginx sits in front of both containers.
# Your frontend code calls http://localhost:8000/api/...
# Nginx intercepts those and forwards them to the backend container.
# No frontend code changes needed.

events {
    worker_connections 1024;
}

http {
    server {
        # Accept all traffic on port 80
        listen 80;

        # Forward /api/* requests to the FastAPI backend
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Forward everything else to the Next.js frontend
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Required for Next.js hot reload websocket
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # Also proxy port 8000 directly so localhost:8000 still works
    # This is what your frontend code calls
    server {
        listen 8000;

        location / {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}